server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: fallback pra index.html em rotas client-side (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # /api/* — proxy pro container backend tracking-api via Docker DNS dinâmico.
  # Usa Docker embedded DNS (127.0.0.11) com resolver válido por 10s pra que
  # nginx NÃO falhe no startup se tracking-api ainda não subiu (resolução
  # vira lazy: só resolve quando primeira request chega em /api/).
  #
  # ATENÇÃO: pra esse proxy funcionar, container tracking-api precisa estar
  # na mesma rede Docker que tracking-app (Easypanel gerencia rede `easypanel`
  # automaticamente quando há domain associado nos 2 services).
  #
  # Decisão 2026-05-18 (Pax/Felix debug): nginx tentava DNS upfront → falhava
  # no startup quando tracking-api não respondia ainda → container morria →
  # Traefik retornava 502. Resolver dinâmico fixa isso.
  resolver 127.0.0.11 valid=10s ipv6=off;
  location /api/ {
    set $upstream_tracking_api "http://tracking-api:3000";
    proxy_pass $upstream_tracking_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Retorna 502 limpo se tracking-api offline (em vez de matar nginx)
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_unavailable;
  }

  # Fallback se backend offline — retorna JSON em vez de HTML do Easypanel
  location @api_unavailable {
    add_header Content-Type application/json always;
    return 503 '{"error":"backend_unavailable","message":"tracking-api ainda inicializando ou indisponível"}';
  }

  # Cache longo pra assets estáticos com hash no nome (Vite fingerprinting)
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
