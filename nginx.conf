server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: fallback pra index.html em rotas client-side (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # /api/* — proxy pro container backend tracking-api
  location /api/ {
    proxy_pass http://tracking-api:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Cache longo pra assets estáticos com hash no nome (Vite fingerprinting)
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
