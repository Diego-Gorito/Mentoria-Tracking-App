name: CI

# Otimizado pra economia de minutos GitHub Actions Pro (3000 min/mês free).
# - Roda SÓ em PR pra main (não em push direto, evita rodar 2× pro mesmo commit).
# - Tests + lint + build TypeScript (~2-3min com cache).
# - concurrency cancela runs anteriores se PR receber novos commits (economia ~50%).

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check workers
        run: npx tsc --noEmit -p tsconfig.worker.json

      - name: Tests
        run: npx vitest run --no-coverage

      - name: Build (Vite frontend)
        run: npm run build
