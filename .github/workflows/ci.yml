name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Worker dry-run
        run: |
          cd workers
          # Instala deps do worker se houver package.json separado
          if [ -f package.json ]; then npm ci; fi
          # dry-run valida syntax/bundling sem fazer deploy real
          # || true: tolera falha de auth (sem CLOUDFLARE_API_TOKEN em CI ainda)
          npx wrangler deploy --dry-run --outdir=.wrangler-dryrun || true
