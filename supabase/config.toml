# supabase/config.toml — Supabase CLI config para Mentoria-Tracking-App
# project_ref: cjtwrzlwfqvzukjinmjr (branch staging do rebase)
# Gerado na Fase 5 (fix C3 Quinn gate v1) — 23/05/2026

project_id = "cjtwrzlwfqvzukjinmjr"

[api]
enabled = true
# Port padrão Supabase local
port = 54321
schemas = ["public", "core", "raw", "analytics"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# Site URL base pra redirect OAuth/magic link
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "https://track.escola.click/**",
  "https://tracking.colegiomentoria.com.br/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Hook: enriquece JWT com tenant_id, products, current_product, tracking_role, erp_role
# Ref: ADR-0007 v1.2 Fase 3 + ADR-0085 v1.1 (ERP)
# NOTA REGRA #-2: Edge Function Deno é única exceção Cloudflare-Last (Supabase exige)
[auth.hook.custom_access_token]
enabled = true
uri = "https://cjtwrzlwfqvzukjinmjr.supabase.co/functions/v1/custom-access-token"
secrets = ""

[edge_runtime]
enabled = true

[analytics]
enabled = false
